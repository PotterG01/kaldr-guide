<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Käldr Setup Companion — Step by Step</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=VT323&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-deep: #060912;
    --bg-mid: #0d1525;
    --card: rgba(15, 23, 42, 0.7);
    --card-border: rgba(120, 200, 255, 0.18);
    --accent: #5ad6ff;
    --accent-glow: rgba(90, 214, 255, 0.4);
    --accent-warm: #ff8a4c;
    --correct: #4ade80;
    --warn: #fbbf24;
    --danger: #f87171;
    --text: #e8ecf5;
    --text-dim: #94a3b8;
    --muted: #64748b;
  }

  html, body {
    background: var(--bg-deep);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    line-height: 1.55;
  }

  /* Ambient background glow */
  body::before {
    content: '';
    position: fixed;
    top: -30%; left: -10%;
    width: 80vw; height: 80vh;
    background: radial-gradient(circle, rgba(90,214,255,0.07) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -30%; right: -10%;
    width: 80vw; height: 80vh;
    background: radial-gradient(circle, rgba(255,138,76,0.05) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 880px;
    margin: 0 auto;
    padding: 24px 18px 80px;
  }

  /* HEADER */
  header {
    text-align: center;
    margin-bottom: 24px;
  }
  .brand {
    font-family: 'VT323', monospace;
    color: var(--text-dim);
    font-size: 1rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
  }
  h1.title {
    font-size: clamp(1.8rem, 4.5vw, 2.6rem);
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent-warm) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -0.01em;
    margin-top: 6px;
  }
  .tagline {
    color: var(--text-dim);
    font-size: 1rem;
    margin-top: 8px;
  }

  /* PROGRESS RAIL */
  .progress-wrap {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 18px;
    padding: 16px 18px;
    margin-bottom: 18px;
    backdrop-filter: blur(14px);
  }
  .progress-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    font-family: 'VT323', monospace;
    font-size: 1.05rem;
    color: var(--text-dim);
    letter-spacing: 0.08em;
  }
  .progress-top .pct { color: var(--accent); font-weight: 700; }
  .progress-bar {
    height: 6px;
    background: rgba(255,255,255,0.05);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent-warm));
    border-radius: 3px;
    transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 0 12px var(--accent-glow);
  }

  /* STEP DOTS */
  .step-dots {
    display: flex;
    justify-content: space-between;
    margin-top: 14px;
    gap: 4px;
  }
  .dot {
    flex: 1;
    height: 6px;
    background: rgba(255,255,255,0.06);
    border-radius: 3px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .dot.done { background: var(--correct); }
  .dot.active { background: var(--accent); box-shadow: 0 0 8px var(--accent-glow); }
  .dot:hover:not(.active) { background: rgba(255,255,255,0.18); }

  /* MAIN CARD */
  .step-card {
    background: linear-gradient(135deg, rgba(15, 23, 42, 0.9), rgba(20, 30, 55, 0.85));
    border: 1px solid var(--card-border);
    border-radius: 22px;
    padding: 28px 24px;
    backdrop-filter: blur(20px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    margin-bottom: 18px;
    animation: fadeIn 0.4s ease-out;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .step-meta {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
    font-family: 'VT323', monospace;
    font-size: 1rem;
    color: var(--text-dim);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .step-meta .num {
    background: var(--accent);
    color: var(--bg-deep);
    padding: 2px 10px;
    border-radius: 6px;
    font-weight: 700;
  }
  .step-meta .phase {
    padding: 2px 10px;
    border: 1px solid var(--card-border);
    border-radius: 6px;
  }

  h2.step-title {
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 8px;
    letter-spacing: -0.01em;
  }
  .step-intro {
    color: var(--text-dim);
    font-size: 1rem;
    margin-bottom: 22px;
  }

  /* DIAGRAM AREA */
  .diagram {
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(120,200,255,0.1);
    border-radius: 14px;
    padding: 22px;
    margin-bottom: 22px;
    text-align: center;
  }
  .diagram svg {
    max-width: 100%;
    height: auto;
    display: block;
    margin: 0 auto;
  }
  .diagram-caption {
    font-family: 'VT323', monospace;
    color: var(--text-dim);
    font-size: 0.95rem;
    margin-top: 12px;
    letter-spacing: 0.05em;
  }

  /* INSTRUCTION LIST */
  .instructions {
    list-style: none;
    counter-reset: inst;
  }
  .instructions li {
    counter-increment: inst;
    position: relative;
    padding: 12px 16px 12px 50px;
    margin-bottom: 8px;
    background: rgba(255,255,255,0.025);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 12px;
    transition: all 0.2s;
  }
  .instructions li:hover {
    background: rgba(90,214,255,0.05);
    border-color: rgba(90,214,255,0.15);
  }
  .instructions li::before {
    content: counter(inst);
    position: absolute;
    left: 14px;
    top: 12px;
    width: 26px;
    height: 26px;
    background: rgba(90,214,255,0.15);
    color: var(--accent);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 0.85rem;
    font-family: 'VT323', monospace;
  }

  /* CHECKLIST (checkpoints) */
  .checklist {
    margin-top: 18px;
    padding: 18px;
    background: rgba(74, 222, 128, 0.04);
    border: 1px solid rgba(74, 222, 128, 0.18);
    border-radius: 14px;
  }
  .checklist-title {
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--correct);
    margin-bottom: 12px;
    font-family: 'VT323', monospace;
    font-size: 1rem;
  }
  .check-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.15s;
    user-select: none;
  }
  .check-item:hover { background: rgba(74,222,128,0.06); }
  .check-box {
    width: 22px;
    height: 22px;
    border: 2px solid var(--text-dim);
    border-radius: 6px;
    flex-shrink: 0;
    margin-top: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .check-item.checked .check-box {
    background: var(--correct);
    border-color: var(--correct);
  }
  .check-item.checked .check-box::after {
    content: '✓';
    color: var(--bg-deep);
    font-weight: 700;
    font-size: 0.95rem;
  }
  .check-text { flex: 1; font-size: 0.95rem; }
  .check-item.checked .check-text {
    color: var(--text-dim);
    text-decoration: line-through;
  }

  /* CALLOUTS */
  .callout {
    border-radius: 12px;
    padding: 14px 16px;
    margin: 18px 0;
    display: flex;
    gap: 12px;
    align-items: flex-start;
    font-size: 0.95rem;
  }
  .callout .icon {
    font-size: 1.2rem;
    flex-shrink: 0;
    line-height: 1.4;
  }
  .callout-tip {
    background: rgba(90,214,255,0.06);
    border: 1px solid rgba(90,214,255,0.2);
    color: var(--text);
  }
  .callout-tip .icon { color: var(--accent); }
  .callout-warn {
    background: rgba(251,191,36,0.06);
    border: 1px solid rgba(251,191,36,0.25);
  }
  .callout-warn .icon { color: var(--warn); }
  .callout-danger {
    background: rgba(248,113,113,0.06);
    border: 1px solid rgba(248,113,113,0.25);
  }
  .callout-danger .icon { color: var(--danger); }

  /* NAV */
  .nav {
    display: flex;
    gap: 10px;
    margin-top: 8px;
  }
  .nav-btn {
    flex: 1;
    padding: 14px 18px;
    border-radius: 14px;
    border: 1px solid var(--card-border);
    background: var(--card);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    backdrop-filter: blur(10px);
  }
  .nav-btn:hover:not(:disabled) {
    border-color: var(--accent);
    transform: translateY(-1px);
  }
  .nav-btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }
  .nav-btn.primary {
    background: linear-gradient(135deg, var(--accent), #3a9fc4);
    color: var(--bg-deep);
    border-color: transparent;
    box-shadow: 0 4px 20px rgba(90,214,255,0.25);
  }
  .nav-btn.primary:hover:not(:disabled) {
    box-shadow: 0 6px 30px rgba(90,214,255,0.4);
  }

  /* ACCESSORIES GRID (used in step 1) */
  .acc-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin-top: 12px;
  }
  .acc-item {
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px;
    padding: 14px 10px;
    text-align: center;
    transition: all 0.2s;
    cursor: pointer;
    user-select: none;
  }
  .acc-item:hover {
    border-color: rgba(90,214,255,0.3);
  }
  .acc-item.found {
    background: rgba(74,222,128,0.06);
    border-color: rgba(74,222,128,0.3);
  }
  .acc-item svg {
    width: 50px;
    height: 50px;
    margin: 0 auto 8px;
    display: block;
  }
  .acc-item .label {
    font-size: 0.85rem;
    font-weight: 500;
  }
  .acc-item .qty {
    font-family: 'VT323', monospace;
    font-size: 0.9rem;
    color: var(--text-dim);
    margin-top: 2px;
  }
  .acc-item.found .label::before {
    content: '✓ ';
    color: var(--correct);
  }

  /* COMPLETION SCREEN */
  .completion {
    text-align: center;
    padding: 40px 20px;
  }
  .completion h2 {
    font-size: 2rem;
    background: linear-gradient(135deg, var(--correct), var(--accent));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 12px;
  }
  .badge {
    width: 80px;
    height: 80px;
    margin: 0 auto 20px;
    background: linear-gradient(135deg, var(--correct), var(--accent));
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.5rem;
    box-shadow: 0 0 40px rgba(74,222,128,0.4);
  }

  /* FLOATING RESET */
  .reset-btn {
    position: fixed;
    bottom: 18px;
    right: 18px;
    background: rgba(15, 23, 42, 0.85);
    color: var(--text-dim);
    border: 1px solid var(--card-border);
    padding: 8px 14px;
    border-radius: 20px;
    font-family: 'VT323', monospace;
    font-size: 0.9rem;
    cursor: pointer;
    backdrop-filter: blur(10px);
    z-index: 10;
    transition: color 0.2s;
  }
  .reset-btn:hover { color: var(--danger); }

  @media (max-width: 600px) {
    .container { padding: 16px 12px 80px; }
    .step-card { padding: 22px 18px; }
    h2.step-title { font-size: 1.35rem; }
    .acc-grid { grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); }
  }
</style>
</head>
<body>
  <div class="container">
    <header>
      <div class="brand">Kiva Wellness · Käldr 1HP</div>
      <h1 class="title">Setup Companion</h1>
      <div class="tagline">A guided walk-through. No overwhelm. Tap your way to a working ice bath.</div>
    </header>

    <div class="progress-wrap">
      <div class="progress-top">
        <span>Step <span id="stepNum">1</span> of <span id="stepTotal">9</span></span>
        <span><span class="pct" id="pctText">0%</span> COMPLETE</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width: 0%"></div></div>
      <div class="step-dots" id="stepDots"></div>
    </div>

    <div id="stepContainer"></div>

    <div class="nav">
      <button class="nav-btn" id="prevBtn">← Back</button>
      <button class="nav-btn primary" id="nextBtn">Start →</button>
    </div>
  </div>

  <button class="reset-btn" id="resetBtn">Reset progress</button>

<script>
/* ============================================================
   SVG DIAGRAMS — drawn inline so the file is fully portable
   ============================================================ */

const SVG = {
  // Site placement diagram — chiller with clearance arrows
  placement: `
    <svg viewBox="0 0 500 280" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="chillGrad" x1="0" y1="0" x2="0" y2="1">

      </defs>
      <!-- Wall behind -->
      <rect x="20" y="40" width="460" height="20" fill="#1a2238" stroke="#5ad6ff" stroke-opacity="0.3"/>
      <text x="250" y="35" fill="#94a3b8" font-size="11" text-anchor="middle" font-family="VT323">WALL / OBSTRUCTION</text>

      <!-- Chiller body -->
      <rect x="180" y="120" width="140" height="100" rx="8" fill="url(#chillGrad)" stroke="#5ad6ff" stroke-width="1.5"/>
      <!-- Fan circle -->
      <circle cx="210" cy="170" r="32" fill="none" stroke="#5ad6ff" stroke-width="1.5"/>
      <circle cx="210" cy="170" r="4" fill="#5ad6ff"/>
      <line x1="210" y1="170" x2="210" y2="142" stroke="#5ad6ff" stroke-width="1.5"/>
      <line x1="210" y1="170" x2="234" y2="184" stroke="#5ad6ff" stroke-width="1.5"/>
      <line x1="210" y1="170" x2="186" y2="184" stroke="#5ad6ff" stroke-width="1.5"/>
      <!-- Display -->
      <circle cx="285" cy="155" r="14" fill="#0a1020" stroke="#5ad6ff" stroke-width="1"/>
      <!-- Wheels -->
      <circle cx="190" cy="225" r="6" fill="#1a2238" stroke="#5ad6ff" stroke-opacity="0.5"/>
      <circle cx="305" cy="225" r="6" fill="#1a2238" stroke="#5ad6ff" stroke-opacity="0.5"/>

      <!-- Ground -->
      <line x1="20" y1="240" x2="480" y2="240" stroke="#94a3b8" stroke-opacity="0.3" stroke-dasharray="3,3"/>

      <!-- Front clearance arrow (1m) -->
      <line x1="50" y1="170" x2="175" y2="170" stroke="#ff8a4c" stroke-width="2" marker-start="url(#arrL)" marker-end="url(#arrR)"/>
      <text x="112" y="160" fill="#ff8a4c" font-size="13" text-anchor="middle" font-weight="700">1 metre</text>
      <text x="112" y="190" fill="#ff8a4c" font-size="10" text-anchor="middle" font-family="VT323">FAN SIDE</text>

      <text x="376" y="160" fill="#5ad6ff" font-size="11" text-anchor="middle">30cm</text>

      <defs>
        <marker id="arrL" viewBox="0 0 10 10" refX="2" refY="5" markerWidth="6" markerHeight="6" orient="auto">
          <path d="M10 0 L0 5 L10 10 z" fill="currentColor"/>
        </marker>
        <marker id="arrR" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
          <path d="M0 0 L10 5 L0 10 z" fill="currentColor"/>
        </marker>
        <marker id="arrU" viewBox="0 0 10 10" refX="5" refY="2" markerWidth="6" markerHeight="6" orient="auto">
          <path d="M0 10 L5 0 L10 10 z" fill="currentColor"/>
        </marker>
        <marker id="arrD" viewBox="0 0 10 10" refX="5" refY="8" markerWidth="6" markerHeight="6" orient="auto">
          <path d="M0 0 L5 10 L10 0 z" fill="currentColor"/>
        </marker>
      </defs>
    </svg>
  `,

  // Tub layout
  tub: `

  // Connection diagram — chiller to tub
  connections: `
    <svg viewBox="0 0 520 280" xmlns="http://www.w3.org/2000/svg">

      <circle cx="370" cy="130" r="5" fill="#5ad6ff"/>

      <circle cx="372" cy="195" r="5" fill="#ff8a4c"/>
      <text x="345" y="200" fill="#ff8a4c" font-size="10" text-anchor="end" font-weight="700">IN</text>

      <!-- Hose: chiller OUT → tub INLET (top, blue) -->
      <path d="M 370 130 Q 290 100 210 130" fill="none" stroke="#5ad6ff" stroke-width="3" opacity="0.85"/>
      <text x="290" y="98" fill="#5ad6ff" font-size="10" text-anchor="middle" font-family="VT323">cold water → tub</text>

      <!-- Hose: tub OUTLET → chiller IN (bottom, orange) -->
      <path d="M 210 180 Q 290 230 372 195" fill="none" stroke="#ff8a4c" stroke-width="3" opacity="0.85"/>
      <text x="290" y="248" fill="#ff8a4c" font-size="10" text-anchor="middle" font-family="VT323">warm water → chiller</text>
    </svg>
  `,

  // Filter housing diagram

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return { current: 0, checks: {}, completed: [] };
}
function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
}

/* ============================================================
   RENDER
   ============================================================ */

function render() {
  const i = state.current;
  const step = STEPS[i];
  const total = STEPS.length;
  const isComplete = i >= total;

  // Progress
  const completedCount = state.completed.length;
  const pct = Math.round((completedCount / total) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('pctText').textContent = pct + '%';
  document.getElementById('stepNum').textContent = Math.min(i + 1, total);
  document.getElementById('stepTotal').textContent = total;

  // Dots
  const dots = document.getElementById('stepDots');
  dots.innerHTML = '';
  STEPS.forEach((_, idx) => {
    const d = document.createElement('div');
    d.className = 'dot';
    if (state.completed.includes(idx)) d.classList.add('done');
    if (idx === i) d.classList.add('active');
    d.title = `Step ${idx + 1}: ${STEPS[idx].title}`;
    d.addEventListener('click', () => { state.current = idx; saveState(); render(); });
    dots.appendChild(d);
  });

  // Container
  const container = document.getElementById('stepContainer');

  if (isComplete) {
    container.innerHTML = `
      <div class="step-card completion">
        <div class="badge">✓</div>
        <h2>You're all set up.</h2>
        <p style="color: var(--text-dim); max-width: 500px; margin: 12px auto;">
          Your Käldr is plumbed, filled, tested, and chilling. Once the water hits your target,
          turn the chiller off and unplug before getting in. Welcome to cold therapy.
        </p>
        <div class="callout callout-tip" style="text-align: left; margin-top: 24px;">
          <span class="icon">📅</span>
          <div><strong>Maintenance reminder:</strong> Replace the internal filter and clean the sediment filter every 2–4 weeks (or every 10–20 plunges). Change the water at the same interval.</div>
        </div>
      </div>
    `;
    document.getElementById('prevBtn').textContent = '← Review steps';
    document.getElementById('nextBtn').textContent = 'Done';
    document.getElementById('nextBtn').disabled = true;
    document.getElementById('prevBtn').disabled = false;
    return;
  }

  let html = `
    <div class="step-card">
      <div class="step-meta">
        <span class="num">${String(i + 1).padStart(2, '0')}</span>
        <span class="phase">${step.phase}</span>
      </div>
      <h2 class="step-title">${step.title}</h2>
      <p class="step-intro">${step.intro}</p>
  `;

  if (step.diagram) {
    html += `
      <div class="diagram">
        ${step.diagram}
        ${step.diagramCaption ? `<div class="diagram-caption">${step.diagramCaption}</div>` : ''}
      </div>
    `;
  }

  if (step.body) html += step.body();

  if (step.checks && step.checks.length) {
    html += `<div class="checklist"><div class="checklist-title">Tap to confirm</div>`;
    step.checks.forEach((text, idx) => {
      const key = `s${i}_c${idx}`;
      const checked = !!state.checks[key];
      html += `
        <div class="check-item ${checked ? 'checked' : ''}" data-key="${key}">
          <div class="check-box"></div>
          <div class="check-text">${text}</div>
        </div>
      `;
    });
    html += `</div>`;
  }

  html += `</div>`;
  container.innerHTML = html;

  // Wire up checks
  document.querySelectorAll('.check-item').forEach(el => {
    el.addEventListener('click', () => {
      const key = el.dataset.key;
      el.classList.toggle('checked');
      state.checks[key] = el.classList.contains('checked');
      maybeMarkStepComplete(i);
      saveState();
      render();
    });
  });

  // Run any onMount hook
  if (step.onMount) step.onMount();

  // Nav
  document.getElementById('prevBtn').disabled = i === 0;
  document.getElementById('prevBtn').textContent = '← Back';
  const allChecksDone = !step.checks?.length || step.checks.every((_, idx) => state.checks[`s${i}_c${idx}`]);
  document.getElementById('nextBtn').disabled = false;
  document.getElementById('nextBtn').textContent =
    i === 0 ? 'Start →' : (i === total - 1 ? (allChecksDone ? 'Finish ✓' : 'Skip to finish →') : (allChecksDone ? 'Next step →' : 'Next (skip checks) →'));
}

function maybeMarkStepComplete(idx) {
  const step = STEPS[idx];
  if (!step.checks?.length) {
    if (!state.completed.includes(idx)) state.completed.push(idx);
    return;
  }
  const allDone = step.checks.every((_, c) => state.checks[`s${idx}_c${c}`]);
  if (allDone && !state.completed.includes(idx)) state.completed.push(idx);
  if (!allDone && state.completed.includes(idx)) {
    state.completed = state.completed.filter(x => x !== idx);
  }
}

/* ============================================================
   NAVIGATION
   ============================================================ */

document.getElementById('nextBtn').addEventListener('click', () => {
  // Auto-mark steps with no checks as completed when advancing
  if (state.current < STEPS.length) {
    const step = STEPS[state.current];
    if (!step.checks?.length && !state.completed.includes(state.current)) {
      state.completed.push(state.current);
    }
  }
  if (state.current < STEPS.length) {
    state.current++;
  }
  saveState();
  window.scrollTo({ top: 0, behavior: 'smooth' });
  render();
});

document.getElementById('prevBtn').addEventListener('click', () => {
  if (state.current > 0) {
    state.current--;
    saveState();
    window.scrollTo({ top: 0, behavior: 'smooth' });
    render();
  }
});

document.getElementById('resetBtn').addEventListener('click', () => {
  if (confirm('Reset all progress? You\'ll start from step 1 with all checkboxes cleared.')) {
    state = { current: 0, checks: {}, completed: [] };
    saveState();
    render();
  }
});

// Initial render
render();
</script>
</body>
</html>
